<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — Admin AegonPerfumes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-card__logo">AEGON<span>PERFUMES</span></div>
    <p class="login-card__subtitle">Panel de administración</p>

    <form id="login-form">
      <div class="form-field">
        <label for="input-email">Correo</label>
        <input type="email" id="input-email" required autocomplete="username">
      </div>

      <div class="form-field">
        <label for="input-password">Contraseña</label>
        <input type="password" id="input-password" required autocomplete="current-password">
      </div>

      <div id="login-error" class="checkout-error" hidden></div>

      <button type="submit" class="btn btn-primary" id="btn-entrar" style="width:100%;">Entrar</button>
    </form>
  </div>
</div>

<script type="module" src="../js/admin/login.js"></script>
</body>
</html>
